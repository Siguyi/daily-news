<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萍姐AI日报 - {{DATE}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .header .date {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
        }
        .stats {
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 30px;
            text-align: center;
            color: white;
        }
        .news-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .news-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .tag {
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .news-title {
            color: #1f2937;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        .news-summary {
            color: #4b5563;
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 16px;
        }
        .news-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .source {
            color: #6b7280;
            font-size: 0.85rem;
        }
        .read-more {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .read-more:hover {
            color: #764ba2;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            body {
                padding: 20px 10px;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .news-card {
                padding: 16px;
            }
            .news-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📰 萍姐AI日报</h1>
            <p class="date">{{DATE}}</p>
        </div>

        <div class="stats">
            今日精选 {{NEWS_COUNT}} 条 AI 行业资讯
        </div>

        <div class="news-list">
            {{NEWS_ITEMS}}
        </div>

        <div class="footer">
            <p>由 Claude AI 自动整理 | 生成时间: {{GENERATE_TIME}}</p>
        </div>
    </div>
</body>
</html>
